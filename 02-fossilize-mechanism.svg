<svg width="680" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>How Fossilize recording and replay works</title>
  <desc>Two-phase diagram: Steam records pipeline states into .foz files during play, then fossilize_replay compiles them against your GPU driver ahead of time</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }
      .container-blue   { fill: #e6f1fb; fill-opacity: 0.35; stroke: #378add; }
      .container-teal   { fill: #e1f5ee; fill-opacity: 0.35; stroke: #1d9e75; }
      .box-gray         { fill: #f1efe8; stroke: #888780; }
      .box-blue         { fill: #b5d4f4; stroke: #185fa5; }
      .box-purple       { fill: #ceecbf6; stroke: #534ab7; }
      .box-teal         { fill: #9fe1cb; stroke: #0f6e56; }
      .box-green        { fill: #eaf3de; stroke: #3b6d11; }
      .th-dark  { fill: #1a1a1a; }
      .th-blue  { fill: #0c447c; }
      .th-purple{ fill: #3c3489; }
      .th-teal  { fill: #085041; }
      .th-green { fill: #27500a; }
      .ts-mid   { fill: #555; }
      .ts-blue  { fill: #185fa5; }
      .ts-purple{ fill: #534ab7; }
      .ts-teal  { fill: #0f6e56; }
      .ts-green { fill: #3b6d11; }
    </style>
  </defs>

  <!-- Phase 1 container -->
  <rect x="20" y="20" width="300" height="210" rx="16" stroke-width="0.8" class="container-blue"/>
  <text class="th th-blue" x="170" y="46" text-anchor="middle" dominant-baseline="central">Phase 1 — recording</text>
  <text class="ts ts-mid" x="170" y="64" text-anchor="middle" dominant-baseline="central">Happens automatically while you play</text>

  <!-- Game -->
  <rect x="40" y="80" width="120" height="48" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th th-dark" x="100" y="99" text-anchor="middle" dominant-baseline="central">Game runs</text>
  <text class="ts ts-mid" x="100" y="115" text-anchor="middle" dominant-baseline="central">via Proton / DXVK</text>

  <line x1="160" y1="104" x2="188" y2="104" class="arr" marker-end="url(#arrow)"/>

  <!-- Fossilize layer -->
  <rect x="188" y="80" width="112" height="48" rx="8" stroke-width="0.5" class="box-blue"/>
  <text class="th th-blue" x="244" y="99" text-anchor="middle" dominant-baseline="central">Fossilize layer</text>
  <text class="ts ts-blue" x="244" y="115" text-anchor="middle" dominant-baseline="central">Intercepts Vulkan</text>

  <line x1="244" y1="128" x2="244" y2="158" class="arr" marker-end="url(#arrow)"/>

  <!-- .foz file -->
  <rect x="152" y="158" width="168" height="52" rx="8" stroke-width="0.5" fill="#eeedfe" stroke="#534ab7"/>
  <text class="th th-purple" x="236" y="178" text-anchor="middle" dominant-baseline="central">fozpipelinesv6/*.foz</text>
  <text class="ts ts-purple" x="236" y="196" text-anchor="middle" dominant-baseline="central">Pipeline states saved to disk</text>

  <!-- Between-phase arrow -->
  <line x1="322" y1="240" x2="358" y2="240" class="arr" stroke="#aaa" marker-end="url(#arrow)"/>

  <!-- Phase 2 container -->
  <rect x="360" y="20" width="300" height="340" rx="16" stroke-width="0.8" class="container-teal"/>
  <text class="th th-teal" x="510" y="46" text-anchor="middle" dominant-baseline="central">Phase 2 — replay</text>
  <text class="ts ts-mid" x="510" y="64" text-anchor="middle" dominant-baseline="central">Run before you launch the game</text>

  <!-- fossilize_replay -->
  <rect x="380" y="80" width="260" height="48" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th th-teal" x="510" y="99" text-anchor="middle" dominant-baseline="central">fossilize_replay</text>
  <text class="ts ts-teal" x="510" y="115" text-anchor="middle" dominant-baseline="central">Reads each .foz pipeline state</text>

  <line x1="510" y1="128" x2="510" y2="158" class="arr" marker-end="url(#arrow)"/>

  <!-- GPU driver -->
  <rect x="380" y="158" width="260" height="48" rx="8" stroke-width="0.5" class="box-green"/>
  <text class="th th-green" x="510" y="177" text-anchor="middle" dominant-baseline="central">Your GPU driver</text>
  <text class="ts ts-green" x="510" y="193" text-anchor="middle" dominant-baseline="central">Compiles to hardware machine code</text>

  <line x1="510" y1="206" x2="510" y2="236" class="arr" marker-end="url(#arrow)"/>

  <!-- Driver cache -->
  <rect x="380" y="236" width="260" height="48" rx="8" stroke-width="0.5" class="box-green"/>
  <text class="th th-green" x="510" y="255" text-anchor="middle" dominant-baseline="central">Driver cache populated</text>
  <text class="ts ts-green" x="510" y="271" text-anchor="middle" dominant-baseline="central">All pipelines ready to load</text>

  <line x1="510" y1="284" x2="510" y2="314" class="arr" marker-end="url(#arrow)"/>

  <!-- Result -->
  <rect x="380" y="314" width="260" height="30" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th th-teal" x="510" y="329" text-anchor="middle" dominant-baseline="central">Game launches — zero stutter</text>

  <!-- Final outcome bottom -->
  <rect x="170" y="390" width="340" height="48" rx="8" stroke-width="0.8" fill="#e1f5ee" stroke="#1d9e75"/>
  <text class="th th-teal" x="340" y="409" text-anchor="middle" dominant-baseline="central">Next launch: pipelines load from cache instantly</text>
  <text class="ts ts-teal" x="340" y="426" text-anchor="middle" dominant-baseline="central">No on-demand compilation, no frame drops</text>

  <path d="M510 344 L510 414 L512 414" fill="none" stroke="#1d9e75" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M236 210 L236 414 L168 414" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
</svg>
