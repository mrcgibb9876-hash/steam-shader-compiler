<svg width="680" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Steam built-in shader pre-caching vs Shader Pre-Cache tool</title>
  <desc>Side-by-side comparison showing what Steam's built-in system handles and where the Shader Pre-Cache tool fills the gaps</desc>
  <defs>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; }
      .container-gray   { fill: #f1efe8; fill-opacity: 0.5; stroke: #b4b2a9; }
      .container-purple { fill: #eeedfe; fill-opacity: 0.4; stroke: #7f77dd; }
      .box-gray         { fill: #e8e6df; stroke: #888780; }
      .box-teal         { fill: #9fe1cb; stroke: #0f6e56; }
      .box-purple       { fill: #afa9ec; stroke: #534ab7; }
      .gap-box          { fill: none; stroke: #ccc; stroke-dasharray: 4 3; }
      .th-dark   { fill: #1a1a1a; }
      .th-gray   { fill: #2c2c2a; }
      .th-teal   { fill: #085041; }
      .th-purple { fill: #3c3489; }
      .ts-mid    { fill: #666; }
      .ts-teal   { fill: #0f6e56; }
      .ts-purple { fill: #534ab7; }
      .ts-muted  { fill: #999; }
    </style>
  </defs>

  <!-- Left: Steam built-in container -->
  <rect x="20" y="16" width="300" height="366" rx="16" stroke-width="0.8" class="container-gray"/>
  <text class="th th-gray" x="170" y="44" text-anchor="middle" dominant-baseline="central">Steam built-in</text>

  <!-- Steam item 1 -->
  <rect x="38" y="64" width="264" height="52" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th th-gray" x="170" y="83" text-anchor="middle" dominant-baseline="central">Runs on download / update</text>
  <text class="ts ts-mid" x="170" y="99" text-anchor="middle" dominant-baseline="central">Background when Steam is open</text>

  <!-- Steam item 2 -->
  <rect x="38" y="128" width="264" height="52" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th th-gray" x="170" y="147" text-anchor="middle" dominant-baseline="central">Downloads community .foz packs</text>
  <text class="ts ts-mid" x="170" y="163" text-anchor="middle" dominant-baseline="central">Other players + Valve</text>

  <!-- Steam item 3 -->
  <rect x="38" y="192" width="264" height="52" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th th-gray" x="170" y="211" text-anchor="middle" dominant-baseline="central">Replays locally on your GPU</text>
  <text class="ts ts-mid" x="170" y="227" text-anchor="middle" dominant-baseline="central">Compiles to your driver — not generic</text>

  <!-- Gaps Steam doesn't handle -->
  <rect x="38" y="256" width="264" height="112" rx="8" class="gap-box"/>
  <text class="ts ts-muted" x="170" y="282" text-anchor="middle" dominant-baseline="central">✗  Doesn't re-run after driver updates</text>
  <text class="ts ts-muted" x="170" y="304" text-anchor="middle" dominant-baseline="central">✗  No per-game targeting</text>
  <text class="ts ts-muted" x="170" y="326" text-anchor="middle" dominant-baseline="central">✗  No GPU or thread selection</text>
  <text class="ts ts-muted" x="170" y="348" text-anchor="middle" dominant-baseline="central">✗  No manual trigger</text>

  <!-- Plus sign between columns -->
  <text x="340" y="204" text-anchor="middle" dominant-baseline="central" font-size="22" font-weight="300" fill="#aaa">+</text>
  <text class="ts ts-muted" x="340" y="224" text-anchor="middle" dominant-baseline="central">fills gaps</text>

  <!-- Right: Shader Pre-Cache container -->
  <rect x="360" y="16" width="300" height="366" rx="16" stroke-width="0.8" class="container-purple"/>
  <text class="th th-purple" x="510" y="44" text-anchor="middle" dominant-baseline="central">Shader Pre-Cache</text>

  <!-- Tool item 1 -->
  <rect x="378" y="64" width="264" height="52" rx="8" stroke-width="0.5" class="box-purple"/>
  <text class="th th-purple" x="510" y="83" text-anchor="middle" dominant-baseline="central">Replays your own recorded sessions</text>
  <text class="ts ts-purple" x="510" y="99" text-anchor="middle" dominant-baseline="central">Pipelines your GPU actually encountered</text>

  <!-- Tool item 2 -->
  <rect x="378" y="128" width="264" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th th-teal" x="510" y="147" text-anchor="middle" dominant-baseline="central">Re-run any time — on demand</text>
  <text class="ts ts-teal" x="510" y="163" text-anchor="middle" dominant-baseline="central">✓  Ideal right after a driver update</text>

  <!-- Tool item 3 -->
  <rect x="378" y="192" width="264" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th th-teal" x="510" y="211" text-anchor="middle" dominant-baseline="central">Choose GPU + thread count</text>
  <text class="ts ts-teal" x="510" y="227" text-anchor="middle" dominant-baseline="central">✓  Target dGPU on hybrid laptops</text>

  <!-- Tool item 4 -->
  <rect x="378" y="256" width="264" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th th-teal" x="510" y="275" text-anchor="middle" dominant-baseline="central">Per-game selection</text>
  <text class="ts ts-teal" x="510" y="291" text-anchor="middle" dominant-baseline="central">✓  Compile one game or all at once</text>

  <!-- Tool item 5 -->
  <rect x="378" y="320" width="264" height="48" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th th-teal" x="510" y="339" text-anchor="middle" dominant-baseline="central">Live progress + compiled badges</text>
  <text class="ts ts-teal" x="510" y="355" text-anchor="middle" dominant-baseline="central">✓  Know exactly what's been compiled</text>
</svg>
