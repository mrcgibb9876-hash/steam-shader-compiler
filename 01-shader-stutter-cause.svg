<svg width="680" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>What causes shader stutter on Linux</title>
  <desc>A flowchart showing how on-demand pipeline compilation causes mid-frame stutter during gameplay</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }
      .box-gray   { fill: #f1efe8; stroke: #b4b2a9; }
      .box-blue   { fill: #e6f1fb; stroke: #378add; }
      .box-teal   { fill: #e1f5ee; stroke: #1d9e75; }
      .box-coral  { fill: #faece7; stroke: #d85a30; }
      .box-red    { fill: #fcebeb; stroke: #e24b4a; }
      .th-gray    { fill: #2c2c2a; }
      .th-blue    { fill: #0c447c; }
      .th-teal    { fill: #085041; }
      .th-coral   { fill: #712b13; }
      .th-red     { fill: #791f1f; }
      .ts-gray    { fill: #5f5e5a; }
      .ts-blue    { fill: #185fa5; }
      .ts-teal    { fill: #0f6e56; }
      .ts-coral   { fill: #993c1d; }
      .ts-red     { fill: #a32d2d; }
    </style>
  </defs>

  <!-- Row 1: Game triggers new draw call -->
  <rect x="220" y="30" width="240" height="52" rx="8" stroke-width="0.5" class="box-gray"/>
  <text class="th th-gray" x="340" y="52" text-anchor="middle" dominant-baseline="central">Game issues a draw call</text>
  <text class="ts ts-gray" x="340" y="69" text-anchor="middle" dominant-baseline="central">New shader combination encountered</text>

  <line x1="340" y1="82" x2="340" y2="112" class="arr" marker-end="url(#arrow)"/>

  <!-- Row 2: Driver checks cache -->
  <rect x="220" y="112" width="240" height="52" rx="8" stroke-width="0.5" class="box-blue"/>
  <text class="th th-blue" x="340" y="133" text-anchor="middle" dominant-baseline="central">Driver checks pipeline cache</text>
  <text class="ts ts-blue" x="340" y="150" text-anchor="middle" dominant-baseline="central">Is this pipeline already compiled?</text>

  <!-- Branch yes -->
  <line x1="460" y1="138" x2="545" y2="138" class="arr" marker-end="url(#arrow)"/>
  <text class="ts ts-gray" x="500" y="130" text-anchor="middle">Yes ✓</text>
  <rect x="545" y="112" width="115" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text class="th th-teal" x="602" y="133" text-anchor="middle" dominant-baseline="central">Cache hit</text>
  <text class="ts ts-teal" x="602" y="150" text-anchor="middle" dominant-baseline="central">Loads instantly</text>

  <!-- Branch no -->
  <line x1="340" y1="164" x2="340" y2="196" class="arr" marker-end="url(#arrow)"/>
  <text class="ts ts-gray" x="356" y="185" text-anchor="start">No</text>

  <!-- Row 3: Compile stall -->
  <rect x="180" y="196" width="320" height="52" rx="8" stroke-width="0.5" class="box-coral"/>
  <text class="th th-coral" x="340" y="217" text-anchor="middle" dominant-baseline="central">Driver compiles pipeline on-demand</text>
  <text class="ts ts-coral" x="340" y="234" text-anchor="middle" dominant-baseline="central">CPU + GPU stall for 5–100 ms</text>

  <line x1="340" y1="248" x2="340" y2="278" class="arr" marker-end="url(#arrow)"/>

  <!-- Row 4: Stutter -->
  <rect x="200" y="278" width="280" height="52" rx="8" stroke-width="0.5" class="box-red"/>
  <text class="th th-red" x="340" y="299" text-anchor="middle" dominant-baseline="central">Frame drops and hitches</text>
  <text class="ts ts-red" x="340" y="316" text-anchor="middle" dominant-baseline="central">Visible stutter mid-game</text>

  <!-- Loop back arrow -->
  <path d="M200 304 L140 304 L140 55 L220 55" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts ts-gray" x="100" y="185" text-anchor="middle">Repeats</text>
  <text class="ts ts-gray" x="100" y="200" text-anchor="middle">every new</text>
  <text class="ts ts-gray" x="100" y="215" text-anchor="middle">area</text>
</svg>
