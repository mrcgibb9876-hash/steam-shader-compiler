<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d9eff"/>
      <stop offset="1" stop-color="#6b4fff"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <!-- Rounded app tile -->
  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg)"/>

  <!-- Jagged 'stutter' line fading out on the left -->
  <path d="M44 150 L62 110 L76 168 L90 120 L104 158"
        fill="none" stroke="#ffffff" stroke-opacity="0.32"
        stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Smooth 'stutterless' frametime curve taking over -->
  <path d="M104 158 C 130 158, 138 96, 168 96 C 196 96, 200 140, 224 140"
        fill="none" stroke="url(#wave)" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Leading dot on the smooth curve -->
  <circle cx="224" cy="140" r="11" fill="#ffffff"/>
</svg>
