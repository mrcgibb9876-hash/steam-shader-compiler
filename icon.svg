<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d9eff"/>
      <stop offset="100%" stop-color="#6b4fff"/>
    </linearGradient>
    <linearGradient id="top-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5bb8ff"/>
      <stop offset="100%" stop-color="#8b6fff"/>
    </linearGradient>
    <linearGradient id="left-face" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a3d66"/>
      <stop offset="100%" stop-color="#2a2060"/>
    </linearGradient>
    <linearGradient id="right-face" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e4a7a"/>
      <stop offset="100%" stop-color="#312470"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outer-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e2a40" stroke-width="1" opacity="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Glow halo behind stack -->
  <ellipse cx="256" cy="270" rx="130" ry="50" fill="#3d9eff" opacity="0.12" filter="url(#outer-glow)"/>

  <!-- === Isometric layer stack === -->
  <!-- Layer 3 (bottom) -->
  <!-- right face -->
  <polygon points="256,340 336,295 336,315 256,360" fill="url(#right-face)" opacity="0.8"/>
  <!-- left face -->
  <polygon points="176,295 256,340 256,360 176,315" fill="url(#left-face)" opacity="0.8"/>
  <!-- top face -->
  <polygon points="176,295 256,250 336,295 256,340" fill="#1a2a4a" opacity="0.9"/>
  <!-- top face accent line -->
  <polygon points="176,295 256,250 336,295 256,340" fill="none" stroke="#2a3d5a" stroke-width="1"/>

  <!-- Layer 2 (middle) -->
  <!-- right face -->
  <polygon points="256,290 336,245 336,268 256,313" fill="url(#right-face)"/>
  <!-- left face -->
  <polygon points="176,245 256,290 256,313 176,268" fill="url(#left-face)"/>
  <!-- top face -->
  <polygon points="176,245 256,200 336,245 256,290" fill="#1e3356"/>
  <polygon points="176,245 256,200 336,245 256,290" fill="none" stroke="#2e4a78" stroke-width="1"/>

  <!-- Layer 1 (top) — brightest, main feature -->
  <!-- right face -->
  <polygon points="256,240 336,195 336,218 256,263" fill="url(#right-face)" filter="url(#glow)"/>
  <!-- left face -->
  <polygon points="176,195 256,240 256,263 176,218" fill="url(#left-face)" filter="url(#glow)"/>
  <!-- top face -->
  <polygon points="176,195 256,150 336,195 256,240" fill="url(#top-face)" filter="url(#glow)"/>
  <!-- top face edge highlight -->
  <polygon points="176,195 256,150 336,195 256,240" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>

  <!-- Highlight edge on top layer top-left -->
  <line x1="176" y1="195" x2="256" y2="150" stroke="#7dd3ff" stroke-width="2" opacity="0.6"/>
  <line x1="256" y1="150" x2="336" y2="195" stroke="#a78bff" stroke-width="2" opacity="0.4"/>

  <!-- Corner accent dots -->
  <circle cx="256" cy="150" r="4" fill="#7dd3ff" opacity="0.9"/>
  <circle cx="176" cy="195" r="3" fill="#3d9eff" opacity="0.7"/>
  <circle cx="336" cy="195" r="3" fill="#6b4fff" opacity="0.7"/>

  <!-- Small circuit node accents on top face -->
  <circle cx="230" cy="183" r="3" fill="#0d1117" stroke="#3d9eff" stroke-width="1.5" opacity="0.9"/>
  <circle cx="256" cy="175" r="3" fill="#0d1117" stroke="#6b4fff" stroke-width="1.5" opacity="0.9"/>
  <circle cx="282" cy="183" r="3" fill="#0d1117" stroke="#3d9eff" stroke-width="1.5" opacity="0.9"/>
  <line x1="230" y1="183" x2="256" y2="175" stroke="#3d9eff" stroke-width="1" opacity="0.6"/>
  <line x1="256" y1="175" x2="282" y2="183" stroke="#6b4fff" stroke-width="1" opacity="0.6"/>

  <!-- Speed lines bottom right (motion/compile feel) -->
  <g opacity="0.25" stroke="url(#accent)" stroke-linecap="round">
    <line x1="340" y1="340" x2="400" y2="340" stroke-width="2"/>
    <line x1="350" y1="356" x2="395" y2="356" stroke-width="1.5"/>
    <line x1="358" y1="372" x2="390" y2="372" stroke-width="1"/>
  </g>

  <!-- Border glow ring -->
  <rect width="512" height="512" rx="96" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.15"/>
</svg>
